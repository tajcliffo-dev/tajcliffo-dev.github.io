<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taj Photography</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
}

header{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:#000;
}

h1{
    font-size:60px;
}

header p{
    margin-top:15px;
    color:#bbb;
    font-size:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.photo{
    height:250px;
    background:#222;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

footer{
    padding:30px;
    text-align:center;
    color:#888;
}
</style>

</head>

<body>

<header>
<h1>Taj Photography</h1>
<p>Sports • Mountain Bike • Action Photography</p>
</header>

<section class="gallery">
<div class="photo">Photo 1</div>
<div class="photo">Photo 2</div>
<div class="photo">Photo 3</div>
<div class="photo">Photo 4</div>
</section>

<footer>
© 2026 Taj Photography
</footer>

</body>
</html>
